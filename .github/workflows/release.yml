name: Release

# Cuts a release of Pennyworth to PyPI and GitHub.
#
# Two ways in:
#   1. Push a tag `vX.Y.Z`  → builds, tests, publishes to PyPI, cuts a GitHub Release.
#   2. Run manually (Actions → Release → Run workflow) with target `testpypi`
#      → a safe dry run that publishes to TestPyPI only (no GitHub Release).
#
# Publishing uses PyPI Trusted Publishing (OIDC) — there is NO API token stored
# anywhere. The one-time setup (registering this workflow as a trusted publisher
# and creating the `pypi` / `testpypi` GitHub environments) is documented in
# docs/releasing.md.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Build + verify. Always runs. Produces the wheel + sdist as an artifact that
  # the publish jobs consume, so what we test is exactly what we ship.
  # ---------------------------------------------------------------------------
  build:
    name: Build & verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Verify tag matches package version
        # Only meaningful for tag pushes. A mismatch here means someone tagged
        # v1.2.3 but forgot to bump pyproject/__init__ — fail loudly, don't ship.
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pyproject="$(poetry version -s)"
          init="$(poetry run python -c 'import pennyworth; print(pennyworth.__version__)')"
          echo "tag=$tag  pyproject=$pyproject  __init__=$init"
          if [ "$tag" != "$pyproject" ] || [ "$tag" != "$init" ]; then
            echo "::error::Version mismatch — tag '$tag', pyproject '$pyproject', __init__ '$init' must all agree. Use scripts/cut-release.sh."
            exit 1
          fi

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint
        run: poetry run ruff check .

      - name: Format check
        run: poetry run ruff format --check .

      - name: Test
        run: poetry run pytest -q

      - name: Build distributions
        run: poetry build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ---------------------------------------------------------------------------
  # Publish to TestPyPI — manual dry runs only.
  # ---------------------------------------------------------------------------
  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/pennyworth-ai/
    permissions:
      id-token: write # OIDC token for Trusted Publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ---------------------------------------------------------------------------
  # Publish to PyPI — real releases (tag push, or a deliberate manual pypi run).
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pennyworth-ai/
    permissions:
      id-token: write # OIDC token for Trusted Publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ---------------------------------------------------------------------------
  # Cut the GitHub Release — tag pushes only. Notes come from CHANGELOG.md.
  # ---------------------------------------------------------------------------
  github-release:
    name: GitHub Release
    needs: publish-pypi
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + upload assets
    steps:
      - uses: actions/checkout@v4

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract changelog section for this version
        id: notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Pull the block between this version's heading and the next "## " heading.
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" {capture=1; next}
            capture && /^## / {exit}
            capture {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No changelog entry for $version — falling back to autogenerated notes." >&2
            echo "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/master/CHANGELOG.md)." > release-notes.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Pennyworth $GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            dist/*
