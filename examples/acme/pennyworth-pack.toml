# An example pack. Attach it to see the generic butler become a platform expert:
#   alfred pack attach examples/acme
#   alfred prompt
[pack]
name = "acme"
platform_name = "the Acme platform"
platform_blurb = "A Python + React monorepo with a REST API and a Postgres store."
principal_file = "principal.md"

[[repos]]
name = "acme-api"
path = "~/code/acme-api"
description = "The REST API service (Python)."

[[repos]]
name = "acme-web"
path = "~/code/acme-web"
description = "The React front-end."

# Hands (MCP): the tool servers Alfred operates the platform through. Brain-only
# for now — the index tells Alfred when to reach for each; wiring them live into
# the host agent is a later step.
[[hands]]
name = "github"
summary = "Pull requests, issues, and CI status — reach for it for any repo or review work."

[[hands]]
name = "postgres"
summary = "Read-only queries against the Acme store — use it to confirm data shape before changing code."
