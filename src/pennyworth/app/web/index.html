<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alfred</title>
<style>
  :root {
    --bg: #262624;
    --side: #1f1e1c;
    --panel: #2f2f2c;
    --elev: #353531;
    --ink: #ece9e3;
    --muted: #9a958c;
    --accent: #c8a96a;
    --user: #36352f;
    --line: #403f3a;
    --danger: #e0846a;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 15px; }
  .app { display: flex; height: 100%; }

  /* Sidebar */
  .sidebar { width: 244px; min-width: 244px; background: var(--side); border-right: 1px solid var(--line); display: flex; flex-direction: column; }
  .brand { display: flex; align-items: center; gap: 9px; padding: 15px 16px; border-bottom: 1px solid var(--line); }
  .brand .avatar { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; object-position: top center; background: var(--panel); }
  .brand .title { font-weight: 600; }
  .bigportrait { width: 88px; height: 88px; border-radius: 50%; object-fit: cover; object-position: top center; display: block; margin: 0 auto 12px; background: var(--panel); }
  .brand .pack { color: var(--muted); font-size: 11.5px; margin-left: auto; }
  .newchat { margin: 12px; padding: 9px 12px; border: 1px solid var(--line); border-radius: 9px; background: transparent; color: var(--ink); cursor: pointer; font-family: var(--sans); font-size: 14px; }
  .newchat:hover { border-color: var(--accent); }
  .chats { flex: 1; overflow-y: auto; padding: 0 8px 12px; }
  .chatitem { display: flex; align-items: center; gap: 6px; padding: 8px 8px 8px 10px; border-radius: 8px; cursor: pointer; color: var(--muted); font-size: 13.5px; }
  .chatitem:hover { background: #2a2926; }
  .chatitem.active { background: #2f2e2a; color: var(--ink); }
  .chatitem .ct { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chatitem .kebab { opacity: 0; border: 0; background: transparent; color: var(--muted); cursor: pointer; font-size: 15px; padding: 0 4px; border-radius: 5px; }
  .chatitem:hover .kebab { opacity: 1; }
  .chatitem .kebab:hover { background: var(--elev); color: var(--ink); }
  .chatitem input.rename { flex: 1; background: var(--bg); color: var(--ink); border: 1px solid var(--accent); border-radius: 5px; font: inherit; padding: 2px 5px; }
  .menu { position: absolute; background: var(--elev); border: 1px solid var(--line); border-radius: 8px; padding: 4px; z-index: 40; box-shadow: 0 8px 24px rgba(0,0,0,.4); }
  .menu button { display: block; width: 100%; text-align: left; background: transparent; border: 0; color: var(--ink); font: inherit; padding: 7px 14px; border-radius: 6px; cursor: pointer; }
  .menu button:hover { background: var(--panel); }
  .menu button.del:hover { color: var(--danger); }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  main { flex: 1; overflow-y: auto; padding: 22px 0; }
  .wrap { max-width: 780px; margin: 0 auto; padding: 0 22px; }
  .msg { margin: 0 0 18px; display: flex; }
  .msg .bubble { padding: 11px 14px; border-radius: 12px; word-wrap: break-word; overflow-wrap: anywhere; max-width: 90%; }
  .msg.user { justify-content: flex-end; }
  .msg.user .bubble { background: var(--user); white-space: pre-wrap; }
  .msg.alfred .bubble { background: var(--panel); border: 1px solid var(--line); }
  .msg .who { font-size: 11px; color: var(--muted); margin: 0 0 4px; }
  .msg.alfred .who { color: var(--accent); }
  .msg .body.err { color: var(--danger); }

  /* Rendered markdown */
  .body h1, .body h2, .body h3 { margin: 12px 0 6px; line-height: 1.25; }
  .body h1 { font-size: 1.3em; } .body h2 { font-size: 1.16em; } .body h3 { font-size: 1.05em; }
  .body ul, .body ol { margin: 6px 0; padding-left: 22px; }
  .body li { margin: 2px 0; }
  .body a.lnk { color: var(--accent); text-decoration: none; cursor: pointer; }
  .body a.lnk:hover { text-decoration: underline; }
  .body blockquote { margin: 6px 0; padding: 2px 12px; border-left: 3px solid var(--line); color: var(--muted); }
  code.inl { font-family: var(--mono); font-size: .9em; background: var(--bg); padding: 1px 5px; border-radius: 5px; }
  .cb { margin: 8px 0; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: #1d1d1b; }
  .cbhead { display: flex; align-items: center; justify-content: space-between; padding: 4px 10px; background: #232321; border-bottom: 1px solid var(--line); }
  .cblang { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .cbcopy { background: transparent; border: 1px solid var(--line); color: var(--muted); border-radius: 5px; font-size: 11px; padding: 2px 8px; cursor: pointer; }
  .cbcopy:hover { color: var(--ink); border-color: var(--accent); }
  .cb pre { margin: 0; padding: 11px 12px; overflow-x: auto; }
  .cb code { font-family: var(--mono); font-size: 12.5px; line-height: 1.5; }

  .reason { margin: 2px 0 8px; font-size: 12.5px; }
  .reason summary { color: var(--muted); cursor: pointer; list-style: none; user-select: none; }
  .reason summary::-webkit-details-marker { display: none; }
  .reason summary:before { content: "▸ "; }
  .reason[open] summary:before { content: "▾ "; }
  .reason .think { white-space: pre-wrap; color: var(--muted); margin: 6px 0; padding: 8px 10px; background: var(--bg); border-radius: 7px; max-height: 220px; overflow-y: auto; font-style: italic; }
  .reason .steps { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
  .step { font-family: var(--mono); font-size: 11px; color: var(--accent); background: var(--bg); border: 1px solid var(--line); border-radius: 5px; padding: 1px 7px; }
  .meta { font-size: 11px; color: var(--muted); margin-top: 6px; }

  .empty { color: var(--muted); text-align: center; margin-top: 14vh; }

  footer { border-top: 1px solid var(--line); padding: 12px 0 14px; }
  .composer { max-width: 780px; margin: 0 auto; padding: 0 22px; display: flex; gap: 10px; align-items: flex-end; }
  textarea { flex: 1; resize: none; background: var(--panel); color: var(--ink); border: 1px solid var(--line); border-radius: 10px; padding: 11px 13px; font-family: var(--sans); font-size: 15px; line-height: 1.5; max-height: 200px; }
  textarea:focus { outline: none; border-color: var(--accent); }
  button.send { background: var(--accent); color: #21201d; border: 0; border-radius: 10px; padding: 0 18px; height: 44px; font-weight: 600; cursor: pointer; font-family: var(--sans); }
  button.send:disabled { opacity: .5; cursor: default; }
  .hint { max-width: 780px; margin: 6px auto 0; padding: 0 22px; font-size: 11px; color: var(--muted); }

  /* Sidebar nav */
  .nav { border-top: 1px solid var(--line); padding: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .nav button { flex: 1 1 auto; background: transparent; border: 1px solid transparent; color: var(--muted); font: inherit; font-size: 12.5px; padding: 7px 8px; border-radius: 7px; cursor: pointer; }
  .nav button:hover { background: #2a2926; color: var(--ink); }
  .nav button.on { color: var(--accent); border-color: var(--line); }

  /* Panels */
  .panel { flex: 1; overflow-y: auto; padding: 26px 0; }
  .panel .wrap { max-width: 720px; }
  .panelhead { font-size: 20px; font-weight: 600; margin: 0 0 4px; }
  .panelsub { color: var(--muted); font-size: 13px; margin: 0 0 20px; }
  .skill { padding: 12px 0; border-bottom: 1px solid var(--line); }
  .skill .sn { font-family: var(--mono); font-size: 13px; color: var(--accent); }
  .skill .src { font-size: 10.5px; color: var(--muted); border: 1px solid var(--line); border-radius: 5px; padding: 1px 6px; margin-left: 8px; }
  .skill .sd { color: var(--ink); font-size: 13px; margin-top: 4px; line-height: 1.5; }
  .field { margin: 0 0 16px; }
  .field label { display: block; font-size: 12.5px; color: var(--muted); margin-bottom: 5px; }
  .field input, .field select { width: 100%; background: var(--panel); color: var(--ink); border: 1px solid var(--line); border-radius: 8px; padding: 9px 11px; font: inherit; }
  .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
  .pbtn { background: var(--accent); color: #21201d; border: 0; border-radius: 8px; padding: 9px 16px; font-weight: 600; cursor: pointer; font: inherit; }
  .pbtn.ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
  .saved { color: var(--accent); font-size: 12.5px; margin-left: 10px; }
  .zoomrow { display: flex; align-items: center; gap: 8px; }
  .aboutface { width: 96px; height: 96px; border-radius: 50%; object-fit: cover; object-position: top center; display: block; margin: 0 0 16px; }
  .about p { line-height: 1.6; color: var(--ink); }

  /* Composer control row (model picker, etc.) */
  .ctrl { max-width: 780px; margin: 6px auto 0; padding: 0 22px; display: flex; gap: 8px; align-items: center; }
  .ctrl select.mdl { background: var(--panel); color: var(--muted); border: 1px solid var(--line); border-radius: 7px; padding: 4px 9px; font: inherit; font-size: 12.5px; cursor: pointer; }
  .ctrl select.mdl:hover { border-color: var(--accent); }
  .ctrl select.mdl:focus { outline: none; border-color: var(--accent); color: var(--ink); }

  /* Stats panel */
  .statgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 16px; }
  .statcard { background: var(--elev); border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; }
  .sv { font-size: 22px; font-weight: 600; color: var(--ink); }
  .sl { font-size: 11.5px; color: var(--muted); margin-top: 4px; }

  /* Slash-command autocomplete menu */
  .slashmenu { position: fixed; background: var(--elev); border: 1px solid var(--line); border-radius: 9px; padding: 4px; z-index: 60; min-width: 270px; box-shadow: 0 10px 28px rgba(0,0,0,.5); }
  .slashitem { display: flex; gap: 10px; align-items: baseline; padding: 7px 12px; border-radius: 6px; cursor: pointer; }
  .slashitem:hover, .slashitem.sel { background: var(--panel); }
  .slashitem .sn { font-family: var(--mono); font-size: 12.5px; color: var(--accent); white-space: nowrap; }
  .slashitem .sd { font-size: 12px; color: var(--muted); }

  /* File attachment chips */
  .chips { max-width: 780px; margin: 6px auto 0; padding: 0 22px; display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { display: flex; align-items: center; gap: 5px; background: var(--elev); border: 1px solid var(--line); border-radius: 6px; padding: 3px 8px; font-size: 12px; }
  .chip .cn { color: var(--ink); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chip .cx { border: 0; background: transparent; color: var(--muted); cursor: pointer; padding: 0 2px; font-size: 14px; line-height: 1; }
  .chip .cx:hover { color: var(--danger); }
  button.attach { background: transparent; border: 1px solid var(--line); color: var(--muted); border-radius: 10px; width: 44px; height: 44px; font-size: 18px; cursor: pointer; flex-shrink: 0; }
  button.attach:hover { border-color: var(--accent); color: var(--ink); }

  /* Embedded PTY terminal pane */
  .termpane { display: flex; flex-direction: column; border-top: 1px solid var(--line); background: #141412; flex-shrink: 0; }
  .termhead { display: flex; align-items: center; gap: 8px; padding: 6px 14px; background: #1a1a18; border-bottom: 1px solid var(--line); font-size: 12.5px; color: var(--muted); user-select: none; }
  .termhead .tt { flex: 1; }
  .termout { overflow-y: auto; padding: 8px 14px; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; white-space: pre-wrap; color: #ccc; min-height: 100px; max-height: 220px; word-break: break-all; }
  .terminput { display: flex; border-top: 1px solid var(--line); }
  .terminput .tprompt { padding: 6px 10px; color: var(--accent); font-family: var(--mono); font-size: 12.5px; user-select: none; }
  .terminput input { flex: 1; background: transparent; border: 0; color: #ccc; font-family: var(--mono); font-size: 12.5px; padding: 6px 4px; outline: none; }
</style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <img class="avatar" src="{{PORTRAIT}}" alt="Alfred" onerror="this.style.display='none'" />
        <span class="title">Alfred</span>
        <span class="pack" id="pack">…</span>
      </div>
      <button class="newchat" id="newchat">＋ New chat</button>
      <div class="chats" id="chats"></div>
      <div class="nav" id="nav">
        <button data-view="chat" class="on">💬 Chat</button>
        <button data-view="skills">⚡ Skills</button>
        <button data-view="settings">⚙ Settings</button>
        <button data-view="stats">📊 Stats</button>
        <button data-view="about">ℹ About</button>
      </div>
    </aside>
    <div class="main">
      <main id="main"><div class="wrap" id="messages"></div></main>
      <section id="panel" class="panel" hidden><div class="wrap" id="panelBody"></div></section>
      <div id="termPane" class="termpane" hidden>
        <div class="termhead">
          <span class="tt">⌥ Shell</span>
          <button id="termClose" class="pbtn ghost" style="padding:2px 10px;font-size:11px;">✕ Close</button>
        </div>
        <div class="termout" id="termOut"></div>
        <div class="terminput">
          <span class="tprompt">$</span>
          <input type="text" id="termIn" placeholder="type a command…" spellcheck="false" autocomplete="off" />
        </div>
      </div>
      <footer id="composerBar">
        <div class="composer">
          <textarea id="input" rows="1" placeholder="Ask Alfred…" autofocus></textarea>
          <button class="attach" id="attach" title="Attach a file">📎</button>
          <button class="send" id="send" disabled>Send</button>
        </div>
        <div class="chips" id="chips"></div>
        <div class="ctrl" id="ctrl">
          <select class="mdl" id="modelSel">
            <option value="">— model default —</option>
          </select>
          <button class="pbtn ghost" id="cwdPick" title="Set working directory" style="font-size:12px;padding:4px 10px;">📁</button>
          <span id="cwdLabel" style="font-size:11.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;" title=""></span>
          <button class="pbtn ghost" id="termToggle" style="margin-left:auto;font-size:12px;padding:4px 10px;">⌥ Shell</button>
        </div>
        <div class="hint">Enter to send · Shift-Enter for a new line · ⌘N new chat · ⌘1–9 switch</div>
      </footer>
    </div>
  </div>

<script>
  "use strict";
  let ready = false, busy = false, seq = 1;
  // chat: {id, title, messages:[{role,text,err?,model?,cost?,thinking?,steps?}],
  //        cost, model:str|null, stored:bool, loaded:bool}
  const chats = [];
  let activeId = null;

  const elChats = document.getElementById("chats");
  const elMessages = document.getElementById("messages");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const elPack = document.getElementById("pack");
  const elNav = document.getElementById("nav");
  const elMain = document.getElementById("main");
  const elPanel = document.getElementById("panel");
  const elPanelBody = document.getElementById("panelBody");
  const elComposerBar = document.getElementById("composerBar");
  const elModelSel = document.getElementById("modelSel");
  const elChips = document.getElementById("chips");
  const elTermPane = document.getElementById("termPane");
  const elTermOut = document.getElementById("termOut");
  const elTermIn = document.getElementById("termIn");
  let currentView = "chat";

  /* ---------- slash-command menu ---------- */
  const SLASH_COMMANDS = [
    { name: "/new",      desc: "Start a new chat" },
    { name: "/clear",    desc: "Clear the current chat" },
    { name: "/model",    desc: "Set model — /model claude-opus-4-8" },
    { name: "/skills",   desc: "Open Skills panel" },
    { name: "/settings", desc: "Open Settings panel" },
    { name: "/stats",    desc: "Open Stats panel" },
    { name: "/about",    desc: "Open About panel" },
  ];
  let slashSel = 0;

  function slashPrefix() {
    const v = input.value, pos = input.selectionStart;
    const seg = v.slice(0, pos).split(/\s/).pop();
    return seg && seg.startsWith("/") ? seg : null;
  }

  function openSlashMenu(items) {
    closeSlashMenu();
    if (!items.length) return;
    const m = document.createElement("div");
    m.className = "slashmenu"; m.id = "slashMenu";
    const rect = input.getBoundingClientRect();
    m.style.left = rect.left + "px";
    m.style.bottom = (window.innerHeight - rect.top + 6) + "px";
    items.forEach((cmd, i) => {
      const row = document.createElement("div");
      row.className = "slashitem" + (i === slashSel ? " sel" : "");
      row.innerHTML = '<span class="sn">' + escapeHtml(cmd.name) + '</span><span class="sd">' + escapeHtml(cmd.desc) + '</span>';
      row.onclick = () => { applySlash(cmd); closeSlashMenu(); };
      m.appendChild(row);
    });
    document.body.appendChild(m);
  }
  function closeSlashMenu() { const m = document.getElementById("slashMenu"); if (m) m.remove(); slashSel = 0; }

  function applySlash(cmd) {
    const v = input.value, pos = input.selectionStart;
    const before = v.slice(0, pos), after = v.slice(pos);
    const seg = before.split(/\s/).pop();
    const stem = before.slice(0, before.length - seg.length);
    if (cmd.name === "/new") { input.value = ""; newChat(); return; }
    if (cmd.name === "/clear") { input.value = ""; const c = active(); if (c) { c.messages = []; renderMessages(); } return; }
    if (["skills","settings","stats","about"].some(v => cmd.name === "/" + v)) {
      input.value = ""; showView(cmd.name.slice(1)); return;
    }
    // For /model and others, insert the command name + a trailing space for the user to complete
    input.value = stem + cmd.name + " " + after;
    input.setSelectionRange((stem + cmd.name + " ").length, (stem + cmd.name + " ").length);
  }

  function updateSlashMenu() {
    const prefix = slashPrefix();
    if (!prefix) { closeSlashMenu(); return; }
    const matches = SLASH_COMMANDS.filter(c => c.name.startsWith(prefix));
    if (!matches.length) { closeSlashMenu(); return; }
    slashSel = Math.min(slashSel, matches.length - 1);
    openSlashMenu(matches);
  }

  /* ---------- file attachments ---------- */
  const pendingFiles = []; // [{name, content}]

  function renderChips() {
    elChips.innerHTML = "";
    pendingFiles.forEach((f, i) => {
      const chip = document.createElement("div"); chip.className = "chip";
      const name = document.createElement("span"); name.className = "cn"; name.textContent = "📄 " + f.name;
      const rm = document.createElement("button"); rm.className = "cx"; rm.textContent = "×";
      rm.onclick = () => { pendingFiles.splice(i, 1); renderChips(); };
      chip.appendChild(name); chip.appendChild(rm);
      elChips.appendChild(chip);
    });
  }

  async function pickAndAttach() {
    if (!api() || !api().pick_file) return;
    let picked;
    try { picked = await api().pick_file(); } catch (e) { return; }
    if (!picked || !picked.ok) return;
    let read;
    try { read = await api().read_file_text(picked.path); } catch (e) { return; }
    if (!read || !read.ok) return;
    pendingFiles.push({ name: read.name, content: read.content, truncated: read.truncated });
    renderChips();
  }

  function api() { return window.pywebview && window.pywebview.api; }
  function active() { return chats.find(c => c.id === activeId); }

  /* ---------- markdown (safe subset) ---------- */
  function escapeHtml(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function renderMarkdown(src) {
    src = String(src || "");
    const blocks = [];
    src = src.replace(/```(\w+)?\n?([\s\S]*?)```/g, (m, lang, code) => {
      blocks.push({ lang: lang || "", code: code.replace(/\n$/, "") });
      return "␀CB" + (blocks.length - 1) + "␀";
    });
    let h = escapeHtml(src);
    h = h.replace(/^### (.*)$/gm, "<h3>$1</h3>")
         .replace(/^## (.*)$/gm, "<h2>$1</h2>")
         .replace(/^# (.*)$/gm, "<h1>$1</h1>");
    h = h.replace(/^&gt; (.*)$/gm, "<blockquote>$1</blockquote>");
    h = h.replace(/`([^`]+)`/g, "<code class='inl'>$1</code>");
    h = h.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
         .replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<em>$2</em>");
    h = h.replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, "<a href='$2' class='lnk'>$1</a>");
    h = h.replace(/(?:^|\n)((?:[-*] .*(?:\n|$))+)/g, (m, items) =>
      "\n<ul>" + items.trim().split("\n").map(l => "<li>" + l.replace(/^[-*] /, "") + "</li>").join("") + "</ul>");
    h = h.replace(/(?:^|\n)((?:\d+\. .*(?:\n|$))+)/g, (m, items) =>
      "\n<ol>" + items.trim().split("\n").map(l => "<li>" + l.replace(/^\d+\. /, "") + "</li>").join("") + "</ol>");
    h = h.replace(/\n{2,}/g, "<br><br>").replace(/\n/g, "<br>");
    h = h.replace(/(<\/(?:h1|h2|h3|ul|ol|blockquote)>)<br>/g, "$1");
    h = h.replace(/␀CB(\d+)␀/g, (m, i) => {
      const b = blocks[+i];
      return "<div class='cb'><div class='cbhead'><span class='cblang'>" + escapeHtml(b.lang) +
        "</span><button class='cbcopy' data-code='" + encodeURIComponent(b.code) +
        "'>copy</button></div><pre><code>" + escapeHtml(b.code) + "</code></pre></div>";
    });
    return h;
  }

  /* ---------- views ---------- */
  function showChatView() {
    currentView = "chat";
    [...elNav.children].forEach(b => b.classList.toggle("on", b.dataset.view === "chat"));
    elMain.hidden = false; elComposerBar.hidden = false; elPanel.hidden = true;
  }
  function showView(name) {
    if (name === "chat") { showChatView(); renderMessages(); input.focus(); return; }
    currentView = name;
    [...elNav.children].forEach(b => b.classList.toggle("on", b.dataset.view === name));
    elMain.hidden = true; elComposerBar.hidden = true; elPanel.hidden = false;
    if (name === "skills") renderSkills();
    else if (name === "settings") renderSettings();
    else if (name === "stats") renderStats();
    else if (name === "about") renderAbout();
  }

  /* ---------- chat list ---------- */
  const elCwdLabel = document.getElementById("cwdLabel");
  function setCwd(c, path) {
    c.cwd = path || null;
    if (elCwdLabel) {
      elCwdLabel.textContent = path ? path.split(/[\\/]/).pop() : "";
      elCwdLabel.title = path || "";
    }
  }

  function newChat() {
    const c = { id: "c" + (seq++), title: "New chat", messages: [], cost: 0, model: null, cwd: null, stored: false, loaded: true };
    chats.unshift(c);
    activeId = c.id;
    elModelSel.value = "";
    setCwd(c, null);
    renderChats(); renderMessages(); showChatView(); input.focus();
  }

  async function selectChat(id) {
    activeId = id;
    const c = active();
    if (c && c.stored && !c.loaded) {
      try {
        const doc = await api().load_app_chat(id);
        if (doc && !doc.error) {
          c.messages = doc.messages || [];
          c.cost = doc.cost || 0;
          c.title = doc.title || c.title;
          c.model = doc.model || null;
          c.cwd = doc.cwd || null;
        }
      } catch (e) {}
      c.loaded = true;
    }
    elModelSel.value = (c && c.model) || "";
    setCwd(c, c && c.cwd);
    renderChats(); renderMessages(); showChatView(); input.focus();
  }

  function renderChats() {
    elChats.innerHTML = "";
    chats.forEach((c, i) => {
      const row = document.createElement("div");
      row.className = "chatitem" + (c.id === activeId ? " active" : "");
      const t = document.createElement("span");
      t.className = "ct"; t.textContent = c.title;
      t.onclick = () => selectChat(c.id);
      const k = document.createElement("button");
      k.className = "kebab"; k.textContent = "⋯";
      k.onclick = (ev) => { ev.stopPropagation(); openMenu(ev, c); };
      row.appendChild(t); row.appendChild(k);
      elChats.appendChild(row);
    });
  }

  function openMenu(ev, c) {
    closeMenu();
    const m = document.createElement("div");
    m.className = "menu"; m.id = "ctxmenu";
    m.style.left = ev.clientX + "px"; m.style.top = ev.clientY + "px";
    const rn = document.createElement("button"); rn.textContent = "Rename";
    rn.onclick = () => { closeMenu(); startRename(c); };
    const dl = document.createElement("button"); dl.className = "del"; dl.textContent = "Delete";
    dl.onclick = () => { closeMenu(); deleteChat(c); };
    m.appendChild(rn); m.appendChild(dl);
    document.body.appendChild(m);
    setTimeout(() => document.addEventListener("click", closeMenu, { once: true }), 0);
  }
  function closeMenu() { const m = document.getElementById("ctxmenu"); if (m) m.remove(); }

  function startRename(c) {
    // Re-render the list with an inline input in place of c's title.
    elChats.innerHTML = "";
    chats.forEach((cc) => {
      const row = document.createElement("div");
      row.className = "chatitem" + (cc.id === activeId ? " active" : "");
      if (cc.id === c.id) {
        const inp = document.createElement("input");
        inp.className = "rename"; inp.value = cc.title;
        inp.onkeydown = (e) => {
          if (e.key === "Enter") { commitRename(cc, inp.value); }
          else if (e.key === "Escape") { renderChats(); }
        };
        inp.onblur = () => commitRename(cc, inp.value);
        row.appendChild(inp);
        elChats.appendChild(row);
        setTimeout(() => { inp.focus(); inp.select(); }, 0);
      } else {
        const t = document.createElement("span");
        t.className = "ct"; t.textContent = cc.title; t.onclick = () => selectChat(cc.id);
        row.appendChild(t);
        elChats.appendChild(row);
      }
    });
  }
  async function commitRename(c, title) {
    title = (title || "").trim() || c.title;
    c.title = title;
    if (c.stored) { try { await api().rename_app_chat(c.id, title); } catch (e) {} }
    renderChats();
  }

  async function deleteChat(c) {
    const i = chats.findIndex(x => x.id === c.id);
    if (i >= 0) chats.splice(i, 1);
    if (c.stored) { try { await api().delete_app_chat(c.id); } catch (e) {} }
    if (activeId === c.id) { if (chats.length) activeId = chats[0].id; else newChat(); }
    renderChats(); renderMessages();
  }

  /* ---------- transcript ---------- */
  function renderMessages() {
    const c = active();
    elMessages.innerHTML = "";
    if (!c || c.messages.length === 0) {
      const e = document.createElement("div");
      e.className = "empty";
      e.innerHTML = '<img class="bigportrait" src="{{PORTRAIT}}" alt="Alfred" onerror="this.style.display=\'none\'" /><div>Good day. How may I be of service?</div>';
      elMessages.appendChild(e);
      return;
    }
    for (const m of c.messages) {
      if (m.role === "user") appendUser(m.text);
      else renderAssistant(m);
    }
    scrollDown();
  }

  function appendUser(text) {
    const msg = document.createElement("div");
    msg.className = "msg user";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    const who = document.createElement("div"); who.className = "who"; who.textContent = "You";
    const body = document.createElement("div"); body.className = "body"; body.textContent = text;
    bubble.appendChild(who); bubble.appendChild(body); msg.appendChild(bubble);
    elMessages.appendChild(msg);
  }

  // Build an Alfred message; returns refs so streaming can update it in place.
  function appendAlfred() {
    const msg = document.createElement("div");
    msg.className = "msg alfred";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    const who = document.createElement("div"); who.className = "who"; who.textContent = "Alfred";
    const reason = document.createElement("details"); reason.className = "reason"; reason.hidden = true;
    const summary = document.createElement("summary"); summary.textContent = "Reasoning";
    const think = document.createElement("div"); think.className = "think"; think.hidden = true;
    const steps = document.createElement("div"); steps.className = "steps";
    reason.appendChild(summary); reason.appendChild(think); reason.appendChild(steps);
    const body = document.createElement("div"); body.className = "body";
    const meta = document.createElement("div"); meta.className = "meta"; meta.hidden = true;
    bubble.appendChild(who); bubble.appendChild(reason); bubble.appendChild(body); bubble.appendChild(meta);
    msg.appendChild(bubble); elMessages.appendChild(msg);
    return { msg, body, meta, reason, think, steps };
  }

  function paintReason(refs, thinking, steps) {
    let any = false;
    if (thinking) { refs.think.hidden = false; refs.think.textContent = thinking; any = true; }
    if (steps && steps.length) {
      refs.steps.innerHTML = "";
      steps.forEach(s => { const c = document.createElement("span"); c.className = "step"; c.textContent = s; refs.steps.appendChild(c); });
      any = true;
    }
    refs.reason.hidden = !any;
  }
  function paintMeta(refs, model, cost) {
    const bits = [];
    if (model) bits.push(model);
    if (typeof cost === "number" && cost > 0) bits.push("$" + cost.toFixed(4));
    if (bits.length) { refs.meta.hidden = false; refs.meta.textContent = bits.join(" · "); }
    else refs.meta.hidden = true;
  }

  // Render a stored/finished assistant message.
  function renderAssistant(m) {
    const refs = appendAlfred();
    if (m.err) refs.body.classList.add("err");
    if (m.err) refs.body.textContent = m.text; else refs.body.innerHTML = renderMarkdown(m.text);
    paintReason(refs, m.thinking, m.steps);
    paintMeta(refs, m.model, m.cost);
  }

  function setBusy(state) { busy = state; sendBtn.disabled = state || !ready; sendBtn.textContent = state ? "…" : "Send"; }
  function nearBottom() { return (window.innerHeight + window.scrollY) >= (document.body.scrollHeight - 60); }
  function scrollDown() { window.scrollTo(0, document.body.scrollHeight); }

  /* ---------- PTY terminal ---------- */
  let termActive = false, termPollTimer = null;

  function stripAnsi(s) {
    return s.replace(/\x1b\[[0-9;]*[mABCDEFGHJKLMSTabcdfghinoqrstu]/g, "")
            .replace(/\x1b[()][AB012]/g, "")
            .replace(/\r/g, "");
  }

  async function openTerminal() {
    if (!api() || !api().term_open) return;
    const c = active();
    if (!c) return;
    try {
      const r = await api().term_open(c.id);
      if (!r || !r.ok) return;
    } catch (e) { return; }
    termActive = true;
    elTermPane.hidden = false;
    elTermOut.textContent = "";
    elTermIn.focus();
    termPollTimer = setInterval(async () => {
      if (!termActive || !api()) return;
      const c2 = active(); if (!c2) return;
      try {
        const r = await api().term_read(c2.id);
        if (r && r.ok && r.output) {
          const stick = elTermOut.scrollHeight - elTermOut.scrollTop <= elTermOut.clientHeight + 20;
          elTermOut.textContent += stripAnsi(r.output);
          if (stick) elTermOut.scrollTop = elTermOut.scrollHeight;
        }
        if (r && r.closed) closeTerminal();
      } catch (e) {}
    }, 100);
  }

  async function closeTerminal() {
    if (termPollTimer) { clearInterval(termPollTimer); termPollTimer = null; }
    termActive = false;
    elTermPane.hidden = true;
    const c = active();
    if (c && api() && api().term_close) {
      try { await api().term_close(c.id); } catch (e) {}
    }
  }

  /* ---------- send / stream ---------- */
  function streamTurn(id, refs) {
    return new Promise((resolve, reject) => {
      let startedText = false;
      const tick = async () => {
        let r;
        try { r = await api().poll(id); } catch (e) { reject(e); return; }
        if (r) {
          const stick = nearBottom();
          if (typeof r.text === "string" && r.text.length) {
            if (!startedText) startedText = true;
            refs.body.innerHTML = renderMarkdown(r.text);
          }
          paintReason(refs, r.thinking, r.steps);
          if (stick) scrollDown();
        }
        if (r && r.done) { resolve(r); return; }
        setTimeout(tick, 90);
      };
      tick();
    });
  }

  async function send() {
    const text = input.value.trim();
    const c = active();
    if (!text || busy || !ready || !c) return;
    // Inject any pending file attachments as context blocks ahead of the message.
    let fullText = text;
    if (pendingFiles.length) {
      const blocks = pendingFiles.map(f =>
        "[File: " + f.name + (f.truncated ? " (truncated)" : "") + "]\n---\n" + f.content + "\n---"
      ).join("\n\n");
      fullText = blocks + "\n\n" + text;
      pendingFiles.splice(0); renderChips();
    }
    c.messages.push({ role: "user", text: fullText });
    if (c.title === "New chat") { c.title = text.slice(0, 42); renderChats(); }
    const model = elModelSel.value || null;
    if (model) c.model = model;
    input.value = ""; input.style.height = "auto";
    appendUser(text);
    const refs = appendAlfred();
    refs.body.textContent = "…";
    setBusy(true); scrollDown();
    let saved = { role: "alfred", text: "" };
    try {
      const started = await api().start(c.messages, model, c.cwd || null);
      if (!started || started.ok === false || !started.id) {
        refs.body.textContent = "(nothing to ask)"; refs.body.classList.add("err");
        saved = { role: "alfred", text: "(nothing to ask)", err: true };
      } else {
        const r = await streamTurn(started.id, refs);
        const reply = (r && r.text) ? r.text : "(the agent produced no output)";
        const isErr = !!(r && r.ok === false);
        if (isErr) { refs.body.classList.add("err"); refs.body.textContent = reply; }
        else refs.body.innerHTML = renderMarkdown(reply);
        paintMeta(refs, r && r.model, r && r.cost);
        if (typeof (r && r.cost) === "number") c.cost = (c.cost || 0) + r.cost;
        saved = { role: "alfred", text: reply, err: isErr,
                  model: r && r.model, cost: r && r.cost,
                  thinking: r && r.thinking, steps: r && r.steps };
      }
    } catch (e) {
      refs.body.textContent = "Error talking to the agent: " + e; refs.body.classList.add("err");
      saved = { role: "alfred", text: String(e), err: true };
    }
    c.messages.push(saved);
    setBusy(false); scrollDown(); input.focus();
    persist(c);
  }

  async function persist(c) {
    try {
      await api().persist_chat(c.id, { title: c.title, messages: c.messages, cost: c.cost, model: c.model || null, cwd: c.cwd || null });
      c.stored = true; c.loaded = true;
    } catch (e) {}
  }

  /* ---------- clipboard + links (delegated) ---------- */
  elMessages.addEventListener("click", async (ev) => {
    const copy = ev.target.closest(".cbcopy");
    if (copy) {
      const code = decodeURIComponent(copy.getAttribute("data-code") || "");
      try { await navigator.clipboard.writeText(code); }
      catch (e) {
        const ta = document.createElement("textarea"); ta.value = code; document.body.appendChild(ta);
        ta.select(); try { document.execCommand("copy"); } catch (_) {} ta.remove();
      }
      const was = copy.textContent; copy.textContent = "copied"; setTimeout(() => copy.textContent = was, 1200);
      return;
    }
    const link = ev.target.closest("a.lnk");
    if (link) {
      ev.preventDefault();
      const href = link.getAttribute("href");
      if (href && api() && api().open_url) { try { await api().open_url(href); } catch (e) {} }
    }
  });

  /* ---------- panels ---------- */
  async function renderSkills() {
    elPanelBody.innerHTML = '<div class="panelhead">Skill Library</div><div class="panelsub">Loading…</div>';
    let rows = [];
    try { rows = await api().list_skills() || []; } catch (e) {}
    const head = '<div class="panelhead">Skill Library</div><div class="panelsub">' +
      rows.length + ' skill' + (rows.length === 1 ? '' : 's') + ' Alfred reads on demand.</div>';
    const list = rows.map(s =>
      '<div class="skill"><span class="sn">' + escapeHtml(s.name) + '</span>' +
      '<span class="src">' + escapeHtml(s.source) + '</span>' +
      '<div class="sd">' + escapeHtml(s.description) + '</div></div>').join("");
    elPanelBody.innerHTML = head + (list || '<div class="panelsub">No skills available.</div>');
  }

  async function renderSettings() {
    let p = { name: "", address: "", addresses: ["sir", "madam"] };
    try { p = await api().get_profile() || p; } catch (e) {}
    const opts = ['<option value=""' + (p.address ? '' : ' selected') + '>— ask each time —</option>']
      .concat((p.addresses || ["sir", "madam"]).map(a =>
        '<option value="' + a + '"' + (a === p.address ? ' selected' : '') + '>' + a + '</option>')).join("");
    const scale = Math.round((parseFloat(localStorage.getItem("uiScale") || "1")) * 100);
    elPanelBody.innerHTML =
      '<div class="panelhead">Settings</div>' +
      '<div class="panelsub">How Alfred addresses you, and how the app looks.</div>' +
      '<div class="field"><label>Your name</label><input id="setName" value="' + escapeHtml(p.name || "") + '" placeholder="e.g. Haim" /></div>' +
      '<div class="field"><label>Address you as</label><select id="setAddr">' + opts + '</select></div>' +
      '<div class="field"><button class="pbtn" id="setSave">Save</button><span class="saved" id="setSaved" hidden>Saved.</span></div>' +
      '<div class="field"><label>Interface size</label><div class="zoomrow">' +
        '<button class="pbtn ghost" id="zOut">A−</button><span id="zVal">' + scale + '%</span>' +
        '<button class="pbtn ghost" id="zIn">A+</button><button class="pbtn ghost" id="zReset">Reset</button></div></div>';
    document.getElementById("setSave").onclick = async () => {
      try {
        const r = await api().set_profile(document.getElementById("setName").value, document.getElementById("setAddr").value);
        if (r && r.ok) { const s = document.getElementById("setSaved"); s.hidden = false; setTimeout(() => s.hidden = true, 1600); }
      } catch (e) {}
    };
    const applyZoom = (v) => { v = Math.max(0.7, Math.min(1.6, Math.round(v * 100) / 100)); localStorage.setItem("uiScale", v); document.body.style.zoom = v; document.getElementById("zVal").textContent = Math.round(v * 100) + "%"; };
    document.getElementById("zIn").onclick = () => applyZoom((parseFloat(localStorage.getItem("uiScale") || "1")) + 0.1);
    document.getElementById("zOut").onclick = () => applyZoom((parseFloat(localStorage.getItem("uiScale") || "1")) - 0.1);
    document.getElementById("zReset").onclick = () => applyZoom(1);
  }

  function stat(label, value) {
    return '<div class="statcard"><div class="sv">' + escapeHtml(String(value)) +
      '</div><div class="sl">' + escapeHtml(label) + '</div></div>';
  }
  async function renderStats() {
    elPanelBody.innerHTML = '<div class="panelhead">Usage</div><div class="panelsub">Loading…</div>';
    let s = {};
    try { s = await api().get_stats() || {}; } catch (e) {}
    const fmt = n => (typeof n === "number") ? n.toLocaleString() : "—";
    elPanelBody.innerHTML =
      '<div class="panelhead">Usage</div>' +
      '<div class="panelsub">Activity across all Claude sessions on this machine.</div>' +
      '<div class="statgrid">' +
        stat("Sessions", fmt(s.sessions)) +
        stat("Messages", fmt(s.messages)) +
        stat("Active days", fmt(s.active_days)) +
        stat("Total tokens", fmt(s.total_tokens)) +
        stat("Input tokens", fmt(s.input_tokens)) +
        stat("Output tokens", fmt(s.output_tokens)) +
      '</div>';
  }

  async function renderAbout() {
    let a = {};
    try { a = await api().about() || {}; } catch (e) {}
    elPanelBody.innerHTML =
      '<div class="panelhead">About</div>' +
      '<div class="about"><img class="aboutface" src="{{PORTRAIT}}" onerror="this.style.display=\'none\'" />' +
      '<p><strong>' + escapeHtml(a.assistant || "Alfred") + '</strong> — ' + escapeHtml(a.tagline || "") + '</p>' +
      '<p>' + escapeHtml(a.blurb || "") + '</p>' +
      (a.pack ? '<p class="panelsub">Active pack: ' + escapeHtml(a.pack) + '</p>'
              : '<p class="panelsub">No pack attached — generic mode.</p>') +
      '<p class="panelsub">Project: ' + escapeHtml(a.project || "Pennyworth") + '</p></div>';
  }

  /* ---------- boot ---------- */
  async function init() {
    if (ready) return;
    ready = true;
    const z = parseFloat(localStorage.getItem("uiScale") || "1");
    if (z && z !== 1) document.body.style.zoom = z;
    const a = api();
    if (a && a.list_app_chats) {
      try {
        const rows = await a.list_app_chats();
        (rows || []).forEach(r => chats.push({ id: r.id, title: r.title, messages: [], cost: r.cost || 0, model: r.model || null, cwd: r.cwd || null, stored: true, loaded: false }));
      } catch (e) {}
    }
    // Populate model picker
    if (a && a.list_models) {
      try {
        const models = await a.list_models() || [];
        models.forEach(m => {
          const opt = document.createElement("option");
          opt.value = m.id; opt.textContent = m.label;
          elModelSel.appendChild(opt);
        });
      } catch (e) {}
    }
    newChat();  // a fresh chat on top of any restored history
    setBusy(false); input.focus();
    if (a && a.get_state) {
      a.get_state().then(s => { elPack.textContent = s && s.pack ? s.pack : "no pack"; })
                   .catch(() => { elPack.textContent = ""; });
    }
  }

  document.getElementById("newchat").addEventListener("click", newChat);
  elNav.querySelectorAll("button").forEach(b => b.addEventListener("click", () => showView(b.dataset.view)));
  sendBtn.addEventListener("click", send);
  document.getElementById("attach").addEventListener("click", pickAndAttach);
  document.getElementById("cwdPick").addEventListener("click", async () => {
    if (!api() || !api().pick_dir) return;
    let r; try { r = await api().pick_dir(); } catch (e) { return; }
    if (!r || !r.ok) return;
    const c = active(); if (!c) return;
    setCwd(c, r.path);
  });
  document.getElementById("termToggle").addEventListener("click", () => { if (termActive) closeTerminal(); else openTerminal(); });
  document.getElementById("termClose").addEventListener("click", closeTerminal);
  elTermIn.addEventListener("keydown", async (ev) => {
    if (!termActive || !api()) return;
    const c = active(); if (!c) return;
    if (ev.key === "Enter") {
      ev.preventDefault();
      const line = elTermIn.value;
      elTermIn.value = "";
      try { await api().term_write(c.id, line + "\n"); } catch (e) {}
    } else if (ev.key === "c" && ev.ctrlKey) {
      ev.preventDefault();
      try { await api().term_write(c.id, "\x03"); } catch (e) {}
    }
  });
  input.addEventListener("keydown", ev => {
    // Slash-menu navigation
    const menu = document.getElementById("slashMenu");
    if (menu) {
      const items = menu.querySelectorAll(".slashitem");
      if (ev.key === "ArrowDown") { ev.preventDefault(); slashSel = (slashSel + 1) % items.length; items.forEach((el, i) => el.classList.toggle("sel", i === slashSel)); return; }
      if (ev.key === "ArrowUp") { ev.preventDefault(); slashSel = (slashSel + items.length - 1) % items.length; items.forEach((el, i) => el.classList.toggle("sel", i === slashSel)); return; }
      if (ev.key === "Escape") { closeSlashMenu(); return; }
      if (ev.key === "Tab" || ev.key === "Enter") {
        const prefix = slashPrefix();
        if (prefix) {
          const matches = SLASH_COMMANDS.filter(c => c.name.startsWith(prefix));
          if (matches[slashSel]) { ev.preventDefault(); applySlash(matches[slashSel]); closeSlashMenu(); return; }
        }
      }
    }
    if (ev.key === "Enter" && !ev.shiftKey) { ev.preventDefault(); send(); }
  });
  input.addEventListener("input", () => {
    input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 200) + "px";
    updateSlashMenu();
  });

  document.addEventListener("keydown", ev => {
    if (!(ev.metaKey || ev.ctrlKey)) return;
    if (ev.key === "n") { ev.preventDefault(); newChat(); }
    else if (ev.key >= "1" && ev.key <= "9") {
      const i = parseInt(ev.key, 10) - 1;
      if (chats[i]) { ev.preventDefault(); selectChat(chats[i].id); }
    }
  });

  window.addEventListener("pywebviewready", init);
  let tries = 0;
  const boot = setInterval(() => { if (api()) { clearInterval(boot); init(); } else if (++tries > 40) clearInterval(boot); }, 150);
</script>
</body>
